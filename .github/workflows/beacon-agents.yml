# ============================================================
# BEACON PROJECT — Complete Agent System Workflows
# ============================================================
# File:     .github/workflows/beacon-agents.yml
# Purpose:  Runs all agents on correct schedules.
#           Silence = all clear. Email = action needed.
#
# Schedule (all times UTC = approximately 6am-7am UK time):
#   Hourly    → Agent 8  (uptime ping)
#   Daily 6am → Agents 1, 2 (accuracy + health)
#   Monday    → Agents 3,4,5,11,12 + full digest
#   1st month → Agents 6,7,9,10
#
# Changed from 8am to 6am UTC so digest arrives ~7am UK time
# Owner: Kleds (Kled-ion on GitHub)
# ============================================================

name: Beacon Agent System

on:
  schedule:
    - cron: '0 * * * *'      # Hourly    — Agent 8 uptime
    - cron: '0 6 * * *'      # Daily 6am — Agents 1, 2
    - cron: '0 6 * * 1'      # Monday 6am — weekly agents
    - cron: '0 7 * * 1'      # Monday 7am — weekly digest
    - cron: '0 6 1 * *'      # 1st month 6am — monthly agents

  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agents to run: all, uptime, daily, weekly, monthly, digest'
        required: true
        default: 'all'

jobs:

  agent-8-uptime:
    name: "Agent 8 — Hourly Uptime Ping"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run uptime ping
        run: node scripts/agent-8-uptime.js

  agent-1-accuracy:
    name: "Agent 1 — Accuracy Watchdog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run accuracy checks
        run: node scripts/agent-1-accuracy.js

  agent-2-health:
    name: "Agent 2 — Site Health Monitor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run health checks
        run: node scripts/agent-2-health.js

  agent-3-seo:
    name: "Agent 3 — SEO Monitor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run SEO monitor
        run: node scripts/agent-3-seo.js

  agent-4-affiliate:
    name: "Agent 4 — Affiliate Health Monitor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run affiliate monitor
        run: node scripts/agent-4-affiliate.js

  agent-5-competitor:
    name: "Agent 5 — Competitor Monitor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run competitor monitor
        run: node scripts/agent-5-competitor.js
        continue-on-error: true

  agent-6-freshness:
    name: "Agent 6 — Content Freshness Auditor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run freshness audit
        run: node scripts/agent-6-freshness.js

  agent-7-legal:
    name: "Agent 7 — Legal Compliance Monitor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run legal checks
        run: node scripts/agent-7-legal.js

  agent-9-sitemap:
    name: "Agent 9 — Sitemap Generator"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Generate sitemap
        run: node scripts/agent-9-sitemap.js
      - name: Commit updated sitemap if changed
        run: |
          git config user.name "Beacon Agent"
          git config user.email "beacon@smartsacrifice.co.uk"
          git add sitemap.xml robots.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update sitemap [beacon-agent-9]"
          git push || true

  agent-10-domains:
    name: "Agent 10 — Domain Renewal Monitor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Check domain renewals
        run: node scripts/agent-10-domains.js

  agent-11-links:
    name: "Agent 11 — Broken Link Crawler"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run link crawler
        run: node scripts/agent-11-links.js

  agent-12-seasonal:
    name: "Agent 12 — Seasonal Content Calendar"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run seasonal calendar
        run: node scripts/agent-12-seasonal.js

  weekly-digest:
    name: "Weekly Digest — Monday Summary"
    runs-on: ubuntu-latest
    needs:
      - agent-1-accuracy
      - agent-2-health
      - agent-3-seo
      - agent-4-affiliate
      - agent-5-competitor
      - agent-11-links
      - agent-12-seasonal
    if: always()
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run weekly digest
        run: node scripts/weekly-digest.js
